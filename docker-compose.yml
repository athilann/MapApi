services:
  mongodb:
    image: mongo:7
    container_name: mapapi-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: map_api

  api:
    build: .
    container_name: mapapi-app
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__MongoDB=mongodb://mongodb:27017
      - DatabaseName=map_api
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongodb_data:
