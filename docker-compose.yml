services:
  mongodb:
    image: mongo:7
    container_name: mapapi-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: map_api

  api:
    build: ./backend
    container_name: mapapi-app
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__MongoDB=mongodb://mongodb:27017
      - DatabaseName=map_api
      - Cors__AllowedOrigins=${CORS_ALLOWED_ORIGINS:-*}
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: mapapi-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mongodb_data:
