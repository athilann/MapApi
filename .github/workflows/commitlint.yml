name: Commit Lint

on:
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint commits
        uses: wagoid/commitlint-github-action@v6.2.1
        with:
          configFile: commitlint.config.js
