name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  IMAGE_NAME: mapapi
  CONTAINER_NAME: mapapi-app

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore dependencies
        run: dotnet restore MapApi.slnx

      - name: Build
        run: dotnet build MapApi.slnx --no-restore -c Release

      - name: Test
        run: dotnet test MapApi.slnx --no-build -c Release --verbosity normal

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "."
          target: /opt/mapapi

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /opt/mapapi

            # Build the Docker image
            docker build -t ${{ env.IMAGE_NAME }}:latest .

            # Stop and remove existing container if running
            docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            docker rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true

            # Start the application with docker compose
            docker compose up -d

            # Run the API container
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --network mapapi_default \
              -p 8080:8080 \
              -e ConnectionStrings__MongoDB=mongodb://mapapi-mongodb:27017 \
              -e DatabaseName=map_api \
              --restart unless-stopped \
              ${{ env.IMAGE_NAME }}:latest

            # Clean up old images
            docker image prune -f

  release:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate version tag
        id: version
        run: echo "tag=v$(date +'%Y.%m.%d')-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          generate_release_notes: true
